<!DOCTYPE html>
<html lang="ja">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <title>AcoustiSophy - v10.4 Orchestration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        input, textarea, select, button { user-select: auto !important; -webkit-user-select: auto !important; touch-action: auto !important; }
        
        body { background-color: #1a1a1a; color: #d4af37; font-family: sans-serif; height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; overscroll-behavior: none; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background-color: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        #start-btn { padding: 20px 40px; font-size: 24px; font-weight: bold; color: #1a1a1a; background-color: #d4af37; border: none; border-radius: 12px; cursor: pointer; }
        
        #mode-switch { display: flex; width: 100%; background: #000; padding: env(safe-area-inset-top, 5px) 5px 5px 5px; z-index: 50; }
        .mode-tab { flex: 1; padding: 10px; text-align: center; font-weight: bold; color: #888; cursor: pointer; transition: 0.3s; border-radius: 8px; }
        .mode-tab.active { background: #d4af37; color: #1a1a1a; }

        #guide-area { height: 35%; background-color: #222; border-bottom: 2px solid #d4af37; display: flex; flex-direction: column; padding: 10px; position: relative; transition: 0.3s; }
        
        /* ▼▼▼ この部分をごっそり上書きしてください ▼▼▼ */

#controls { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; width: 100%; }

#song-selector { flex: 1.2; min-width: 0; padding: 8px 4px; background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; font-size: clamp(12px, 3.5vw, 16px); font-weight: bold; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }

#instrument-selector { flex: 1; min-width: 0; padding: 8px 4px; background: #1a1a1a; color: #d4af37; border: 1px solid #d4af37; border-radius: 6px; font-weight: bold; font-size: clamp(11px, 3vw, 14px); text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }

#key-control-group { display: flex; flex-shrink: 0; align-items: center; gap: 4px; background: #1a1a1a; padding: 4px; border-radius: 6px; border: 1px solid #444; }

#original-key-btn { background: #444; color: #aaa; border: none; padding: 6px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
#original-key-btn.is-original { background: #d4af37; color: #1a1a1a; }

#key-selector { width: 55px; padding: 6px; background: #333; color: #d4af37; border: 1px solid #555; border-radius: 4px; font-weight: bold; font-size: 12px; text-align: center; }

/* ▲▲▲ ここまで ▲▲▲ */
        #scroll-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; background: #2a2a2a; padding: 8px 12px; border-radius: 8px; border: 1px solid #444; }
        #scroll-btn { background: #333; color: #d4af37; border: 1px solid #d4af37; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
        #scroll-speed { flex-grow: 1; accent-color: #d4af37; }

        #layout-lock-btn { background: #1a1a1a; color: #aaa; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.3s; }
        #layout-lock-btn.unlocked { background: #d4af37; color: #1a1a1a; border-color: #d4af37; box-shadow: 0 0 10px rgba(212,175,55,0.5); }
        
        #lyric-display { flex-grow: 1; overflow-y: auto; color: #eee; font-size: 16px; line-height: 2.2; white-space: pre-wrap; padding: 10px 15px; background: #1a1a1a; border-radius: 8px; font-family: 'Courier New', Courier, monospace; }
        
        #free-mode-display { display: none; flex-grow: 1; flex-direction: column; justify-content: center; align-items: center; background: #1a1a1a; border-radius: 8px; position: relative; overflow: hidden; }
        #free-key-selector { font-size: 24px; padding: 10px 20px; background: #333; color: #d4af37; border: 2px solid #d4af37; border-radius: 12px; font-weight: bold; margin-bottom: 20px; outline: none; }
        #current-playing-chord { font-size: 64px; font-weight: bold; color: rgba(255,255,255,0.1); transition: color 0.1s, transform 0.1s; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #current-playing-chord.flash { color: #d4af37; transform: translate(-50%, -50%) scale(1.1); text-shadow: 0 0 20px rgba(212,175,55,0.5); }

        #edit-header { display: none; position: absolute; top: 0; left: 0; width: 100%; padding: env(safe-area-inset-top, 10px) 15px 10px 15px; background: rgba(212, 175, 55, 0.95); justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .edit-title { color: #1a1a1a; font-weight: bold; font-size: 14px; }
        .edit-buttons { display: flex; gap: 10px; }
        .edit-btn { padding: 5px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #reset-order-btn { background: #1a1a1a; color: #d4af37; margin-right: 10px; }
        #save-order-btn { background: #fff; color: #1a1a1a; }
        #toast { position: fixed; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%); background: #4CAF50; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }

        #app-container { display: flex; height: 65%; width: 100%; overflow: hidden; min-height: 0; position: relative; padding-bottom: env(safe-area-inset-bottom, 20px); }
        
        #chord-area { width: 60%; padding: 8px; overflow: hidden; position: relative; display: grid; gap: 6px; grid-auto-rows: minmax(0, 1fr); grid-auto-flow: dense; }
        #chord-area.edit-mode { touch-action: none; }
        .chord-btn { background-color: #2a2a2a; color: #fff; font-weight: bold; border: 2px solid #444; border-radius: 10px; display: flex; justify-content: center; align-items: center; transition: background-color 0.2s; text-align: center; position: relative; touch-action: none; min-height: 0; min-width: 0; word-break: break-word; line-height: 1.1; }
        .chord-btn.active { background-color: #d4af37; color: #1a1a1a; }

        .grid-tier-1 { grid-template-columns: repeat(2, 1fr); }
        .grid-tier-1 > div:nth-child(4n + 1) { grid-row: span 2; font-size: clamp(18px, 6vw, 40px); background: linear-gradient(145deg, #3a3a3a, #222); border-color: #665522; }
        .grid-tier-1 > div:nth-child(4n) { grid-column: span 2; font-size: clamp(16px, 5vw, 36px); background: linear-gradient(145deg, #333, #1a1a1a); }
        .grid-tier-1 > div { font-size: clamp(14px, 4.5vw, 30px); }

        .grid-tier-2 { grid-template-columns: repeat(3, 1fr); }
        .grid-tier-2 > div:nth-child(1) { grid-row: span 2; grid-column: span 2; font-size: clamp(18px, 5vw, 36px); background: linear-gradient(145deg, #3a3a3a, #222); border-color: #665522; }
        .grid-tier-2 > div { font-size: clamp(12px, 3.5vw, 24px); }

        .grid-tier-3 { grid-template-columns: repeat(4, 1fr); gap: 4px !important; }
        .grid-tier-3 > div:nth-child(1) { grid-column: span 2; font-size: clamp(14px, 4vw, 24px); background: linear-gradient(145deg, #3a3a3a, #222); border-color: #665522; }
        .grid-tier-3 > div { font-size: clamp(10px, 3vw, 20px); border-width: 1px; border-radius: 6px; }

        .gesture-hint { position: absolute; font-size: 8px; color: #888; pointer-events: none; }
        .hint-up { top: 2px; } .hint-down { bottom: 2px; } .hint-right { right: 3px; } .hint-left { left: 3px; }
        .chord-btn.active .gesture-hint { color: rgba(26,26,26,0.5); }

        @keyframes jiggle { 0% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } 100% { transform: rotate(-1deg); } }
        .chord-btn.jiggling { animation: jiggle 0.3s infinite; border-color: #d4af37; z-index: 1; }
        .chord-btn.dragging { opacity: 0.8; transform: scale(1.05) !important; z-index: 9999; box-shadow: 0 10px 20px rgba(0,0,0,0.5); animation: none; }
        .chord-placeholder { border: 2px dashed #d4af37; background: transparent; border-radius: 10px; }
        
        #strum-area-container { width: 40%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #111; border-left: 1px solid #333; }
        
        #strum-area { width: 90%; height: 70%; margin-bottom: 20px; background: linear-gradient(135deg, #111, #1a1a1a); border-radius: 20px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 40px 0; position: relative; touch-action: none; box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 10px rgba(212,175,55,0.1); }
        .strum-hint { color: #555; font-size: 12px; pointer-events: none; z-index: 10; font-weight: bold; }
        #visual-strings-container { position: absolute; top: 40px; bottom: 40px; left: 0; width: 100%; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; pointer-events: none; z-index: 5; }
        .string-zone { flex-grow: 1; width: 100%; display: flex; align-items: center; justify-content: center; }
        .visual-string { width: 90%; height: 2px; background: linear-gradient(90deg, rgba(212,175,55,0.1), rgba(212,175,55,0.5), rgba(212,175,55,0.1)); box-shadow: 0 0 5px rgba(212,175,55,0.3); border-radius: 2px; transition: all 0.15s ease-out; }
        .visual-string.plucked { height: 4px; background: linear-gradient(90deg, rgba(255,255,255,0.4), #fff, rgba(255,255,255,0.4)); box-shadow: 0 0 15px rgba(255,255,255,0.9), 0 0 5px #d4af37; transform: scaleY(1.5); }
    </style>
</head>
<body>
    <div id="toast">Layout Saved!</div>
    <div id="start-overlay"><button id="start-btn">Connecting to Cloud...</button></div>
    
    <div id="mode-switch">
        <div id="tab-song" class="mode-tab active">Song Mode</div>
        <div id="tab-free" class="mode-tab">Free Mode</div>
    </div>

    <div id="guide-area">
        <div id="edit-header">
            <span class="edit-title">🔄 指を離さずドラッグ</span>

                <select id="song-selector"></select>

                    <option value="epiano">🎹 Electric Piano</option>
                    <option value="8bit">👾 8-Bit Retro</option>

                <div id="key-control-group">
                    <button id="original-key-btn">Original</button>

                        <option value="7">+7</option><option value="6">+6</option><option value="5">+5</option><option value="4">+4</option><option value="3">+3</option><option value="2">+2</option><option value="1">+1</option>
                        <option value="0" selected>±0</option>
                        <option value="-1">-1</option><option value="-2">-2</option><option value="-3">-3</option><option value="-4">-4</option><option value="-5">-5</option><option value="-6">-6</option><option value="-7">-7</option>

                <option value="C">Key: C (Am)</option><option value="G">Key: G (Em)</option><option value="D">Key: D (Bm)</option><option value="A">Key: A (F#m)</option>
                <option value="E">Key: E (C#m)</option><option value="F">Key: F (Dm)</option><option value="Bb">Key: Bb (Gm)</option><option value="Eb">Key: Eb (Cm)</option>

            <button id="layout-lock-btn-free" style="position:absolute; bottom:30px; right:10px;" class="layout-lock-btn">🔒 Layout</button>

    </div>
    
    <div id="app-container">
        <div id="chord-area"></div>
        <div id="strum-area-container">

        </div>

    <div id="admin-panel" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 10000; padding: env(safe-area-inset-top, 20px) 20px 20px 20px; overflow-y: auto;">
        <h2 style="color: #d4af37; margin-bottom: 15px;">Admin Panel</h2>
        <select id="admin-mode-selector" style="width: 100%; padding: 12px; margin-bottom: 20px; background: #d4af37; color: #1a1a1a; font-weight: bold; border: none; border-radius: 5px; font-size: 16px;">

        });

        function processStrum(e) {
            const yPos = e.clientY - strumRect.top; const stringCount = currentNotes.length; const stringSpacing = strumRect.height / stringCount;
            let stringIndex = (stringCount - 1) - Math.floor(yPos / stringSpacing);
            if (stringIndex < 0) stringIndex = 0; if (stringIndex >= stringCount) stringIndex = stringCount - 1;

            const now = performance.now(); const timeDiff = now - lastStrumTime; lastStrumTime = now;
            let velocity = 0.8;
            if (timeDiff > 0 && lastStringIndex !== -1) { const speed = Math.abs(stringIndex - lastStringIndex) / timeDiff; velocity = Math.min(1.0, Math.max(0.4, speed * 20)); }

            if (lastStringIndex !== -1 && lastStringIndex !== stringIndex) {
                const step = stringIndex > lastStringIndex ? 1 : -1; let i = lastStringIndex + step;
                while (true) { if (!pluckedStrings.has(i)) { triggerString(i, velocity); } if (i === stringIndex) break; i += step; }
            } else if (lastStringIndex === -1) { triggerString(stringIndex, velocity); }

        adminModeSelector.onchange = (e) => {
            const selectedTitle = e.target.value; chordContainer.innerHTML = ''; 
            if (!selectedTitle) { titleInput.value = ''; lyricsInput.value = ''; originalOffsetInput.value = "0"; } 
            else {
                const song = songDatabase[selectedTitle]; titleInput.value = selectedTitle; lyricsInput.value = song.lyrics; originalOffsetInput.value = song.originalOffset || "0"; 
                song.chords.forEach(chord => { let root = (chord.name.length > 1 && (chord.name[1] === '#' || chord.name[1] === 'b')) ? chord.name.substring(0, 2) : chord.name.substring(0, 1); createChordDropdown(root, chord.name.substring(root.length)); });
            }
        };
        function createChordDropdown(defaultRoot = "C", defaultQuality = "") {
            const wrapper = document.createElement('div'); wrapper.className = 'chord-group'; wrapper.style.cssText = "display: flex; background: #d4af37; border-radius: 8px; overflow: hidden; border: 2px solid #b8962e;";
            const rootSelect = document.createElement('select'); rootSelect.style.cssText = "padding: 10px; font-size: 16px; background: transparent; color: #1a1a1a; border: none; font-weight: bold; cursor: pointer; outline: none;";
            rootOptions.forEach(root => { const opt = document.createElement('option'); opt.value = root; opt.textContent = root; if(root === defaultRoot) opt.selected = true; rootSelect.appendChild(opt); });
            const qualitySelect = document.createElement('select'); qualitySelect.style.cssText = "padding: 10px; font-size: 16px; background: transparent; color: #1a1a1a; border: none; font-weight: bold; cursor: pointer; outline: none;";
            qualityOptions.forEach(q => { const opt = document.createElement('option'); opt.value = q.value; opt.textContent = q.label; if(q.value === defaultQuality) opt.selected = true; qualitySelect.appendChild(opt); });
            wrapper.appendChild(rootSelect); wrapper.appendChild(qualitySelect); chordContainer.appendChild(wrapper);
        }
        document.getElementById('add-chord-btn').onclick = () => createChordDropdown(); document.getElementById('remove-chord-btn').onclick = () => { if (chordContainer.lastChild) chordContainer.removeChild(chordContainer.lastChild); };

        document.getElementById('auto-extract-btn').onclick = () => {
            let rawText = document.getElementById('new-lyrics').value;
            if (!rawText) return alert("テキストを貼り付けてください！");

            let cleanText = rawText.replace(/♭/g, 'b').replace(/♯/g, '#');
            const chordRegex = /([A-G][#b]?(?:m|M|add|sus|dim|aug|maj|7|m7|sus4|add9|maj7)?)(?![a-z])/g;
            let matches = cleanText.match(chordRegex);
            let foundUniqueChords = new Set();

            if (matches) {
                matches.forEach(m => {
                    let potentialChord = m.trim().replace(/\[|\]/g, "");
                    let formatted = potentialChord.charAt(0).toUpperCase() + potentialChord.slice(1);
                    if (masterChordDictionary[formatted]) {
                        foundUniqueChords.add(formatted);
                    }
                });
            }

            chordContainer.innerHTML = '';
            if (foundUniqueChords.size === 0) return alert("コードが見つかりませんでした。テキストを確認してください。");

            foundUniqueChords.forEach(chordName => {
                let root = (chordName.length > 1 && (chordName[1] === '#' || chordName[1] === 'b')) ? chordName.substring(0, 2) : chordName.substring(0, 1);
                let quality = chordName.substring(root.length);
                createChordDropdown(root, quality);
            });
        };

        document.getElementById('submit-song').onclick = async () => {
            const title = titleInput.value; const originalOffset = parseInt(originalOffsetInput.value); let rawLyrics = lyricsInput.value.replace(/[\u200B-\u200D\uFEFF]/g, '');
            let tokens = rawLyrics.split(/([\s\t\n\r　]+)/).filter(t => t !== "");
            let resultText = ""; let pendingChords = [];
            const chordRegex = /^([A-G][#b]?(?:m|M|add|sus|dim|aug|maj|7|m7|sus4|add9|maj7)?)(?![a-z])$/i;
            
            for (let token of tokens) { 
                let cleanToken = token.trim().replace(/\[|\]/g, "");
                if (cleanToken !== "" && chordRegex.test(cleanToken) && masterChordDictionary[cleanToken.charAt(0).toUpperCase() + cleanToken.slice(1)]) { 
                    pendingChords.push(cleanToken.charAt(0).toUpperCase() + cleanToken.slice(1)); 
                } else { 
                    let chordStr = pendingChords.length > 0 ? pendingChords.map(c => `[${c}]`).join("") : ""; 
                    resultText += chordStr + token; 
                    pendingChords = []; 
                } 
            }
            if (pendingChords.length > 0) { resultText += pendingChords.map(c => `[${c}]`).join(""); }
            
            const chordsArray = Array.from(chordContainer.querySelectorAll('.chord-group')).map(group => { const combinedName = group.querySelectorAll('select')[0].value + group.querySelectorAll('select')[1].value; return { name: combinedName, notes: masterChordDictionary[combinedName] || "C4,E4,G4" }; });
            if (!title || !resultText) return alert("曲名と歌詞は必須です！"); document.getElementById('submit-song').textContent = "Uploading...";
            try { const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ title: title, lyrics: resultText, chords: JSON.stringify(chordsArray), originalOffset: originalOffset }) }); const result = await response.json(); if (result.status === "success") { location.reload(); } else { throw new Error(result.message); } } catch (error) { alert("エラー: " + error); }
        };

        history.pushState(null, null, location.href);
        window.addEventListener('popstate', (e) => {
            history.go(1);
            toast.textContent = "Back gesture is disabled.";
            toast.style.background = "#e74c3c"; 
            toast.style.opacity = 1;
            setTimeout(() => { 
                toast.style.opacity = 0; 
                setTimeout(() => { toast.style.background = "#4CAF50"; toast.textContent = "Layout Saved!"; }, 300);
            }, 2000);
        });
        fetchSongData();
    </script>
</body>
</html>
