<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AcoustiSophy - v8.3 Invisible Strings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        input, textarea, select, button { user-select: auto !important; touch-action: auto !important; }

        body { background-color: #1a1a1a; color: #d4af37; font-family: sans-serif; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background-color: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        #start-btn { padding: 20px 40px; font-size: 24px; font-weight: bold; color: #1a1a1a; background-color: #d4af37; border: none; border-radius: 12px; cursor: pointer; }
        
        #guide-area { height: 40%; background-color: #222; border-bottom: 2px solid #d4af37; display: flex; flex-direction: column; padding: 10px; position: relative; }
        
        #controls { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
        #song-selector { flex-grow: 1; padding: 10px; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; font-size: 16px; font-weight: bold; }
        
        #key-control-group { display: flex; align-items: center; gap: 5px; background: #1a1a1a; padding: 4px; border-radius: 8px; border: 1px solid #444; }
        #original-key-btn { background: #444; color: #aaa; border: none; padding: 8px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #original-key-btn.is-original { background: #d4af37; color: #1a1a1a; }
        #key-selector { width: 70px; padding: 8px; background: #333; color: #d4af37; border: 1px solid #555; border-radius: 5px; font-weight: bold; text-align: center; }
        
        #scroll-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; background: #2a2a2a; padding: 8px 12px; border-radius: 8px; border: 1px solid #444; }
        #scroll-btn { background: #333; color: #d4af37; border: 1px solid #d4af37; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        #scroll-speed { flex-grow: 1; accent-color: #d4af37; }
        .speed-label { color: #888; font-size: 12px; font-weight: bold; }

        #lyric-display { 
            flex-grow: 1; overflow-y: auto; color: #eee; font-size: 16px; line-height: 2.2; 
            white-space: pre-wrap; padding: 10px 15px; background: #1a1a1a; border-radius: 8px;
            font-family: 'Courier New', Courier, monospace; letter-spacing: 0.5px;
        }
        
        #edit-header { display: none; position: absolute; top: 0; left: 0; width: 100%; padding: 10px 15px; background: rgba(212, 175, 55, 0.95); justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .edit-title { color: #1a1a1a; font-weight: bold; font-size: 14px; }
        .edit-buttons { display: flex; gap: 10px; }
        .edit-btn { padding: 5px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #reset-order-btn { background: #1a1a1a; color: #d4af37; }
        #save-order-btn { background: #fff; color: #1a1a1a; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #4CAF50; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }

        #app-container { display: flex; height: 60%; width: 100%; overflow: hidden; min-height: 0; }
        
        #chord-area { width: 60%; display: grid; gap: 10px; padding: 12px; overflow: hidden; position: relative; }
        #chord-area.edit-mode { touch-action: none; }
        
        .chord-btn { 
            background-color: #2a2a2a; color: #fff; 
            font-size: clamp(16px, 4vw, 32px); 
            font-weight: bold; border: 2px solid #444; border-radius: 12px; 
            display: flex; justify-content: center; align-items: center; 
            transition: background-color 0.2s, transform 0.1s; 
            text-align: center; position: relative;
        }
        .chord-btn.active { background-color: #d4af37; color: #1a1a1a; }
        @keyframes jiggle { 0% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } 100% { transform: rotate(-1deg); } }
        .chord-btn.jiggling { animation: jiggle 0.3s infinite; border-color: #d4af37; z-index: 1; }
        .chord-btn.dragging { opacity: 0.8; transform: scale(1.05); z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.5); animation: none; }
        .chord-placeholder { border: 2px dashed #d4af37; background: transparent; border-radius: 12px; }
        
        /* ★ ストロークエリア：線は引かず、UIはクリーンなまま */
        #strum-area { width: 40%; height: 100%; background: linear-gradient(135deg, #111, #222); display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; position: relative; touch-action: none; }
        .strum-hint { color: #555; font-size: 14px; pointer-events: none; }
        
        /* ★ 弦を弾いた時の波紋エフェクト（視覚的フィードバック） */
        .string-ripple { position: absolute; width: 100%; height: 4px; background: rgba(212, 175, 55, 0.6); box-shadow: 0 0 10px rgba(212, 175, 55, 0.8); left: 0; pointer-events: none; opacity: 1; transition: opacity 0.3s, transform 0.3s; transform: scaleY(1); }
        .string-ripple.fade { opacity: 0; transform: scaleY(3); }
    </style>
</head>
<body>
    <div id="toast">Layout Saved!</div>
    <div id="start-overlay"><button id="start-btn">Connecting to Cloud...</button></div>
    
    <div id="guide-area">
        <div id="edit-header">
            <span class="edit-title">🔄 ドラッグで配置を変更</span>
            <div class="edit-buttons">
                <button id="reset-order-btn" class="edit-btn">↺ Reset</button>
                <button id="save-order-btn" class="edit-btn">✓ Save</button>
            </div>
        </div>

        <div id="controls">
            <select id="song-selector"></select>
            <div id="key-control-group">
                <button id="original-key-btn">Original</button>
                <select id="key-selector">
                    <option value="7">+7</option><option value="6">+6</option><option value="5">+5</option><option value="4">+4</option><option value="3">+3</option><option value="2">+2</option><option value="1">+1</option>
                    <option value="0" selected>±0</option>
                    <option value="-1">-1</option><option value="-2">-2</option><option value="-3">-3</option><option value="-4">-4</option><option value="-5">-5</option><option value="-6">-6</option><option value="-7">-7</option>
                </select>
            </div>
        </div>
        <div id="scroll-controls">
            <button id="scroll-btn">▶ Scroll</button>
            <span class="speed-label">Speed</span>
            <input type="range" id="scroll-speed" min="1" max="60" value="10">
        </div>
        <div id="lyric-display"></div>
    </div>
    
    <div id="app-container">
        <div id="chord-area"></div>
        <div id="strum-area">
            <div class="strum-hint">↑ UP Stroke</div>
            <div class="strum-hint">↓ DOWN Stroke</div>
        </div>
    </div>

    <div id="admin-panel" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 10000; padding: 20px; overflow-y: auto;">
        <h2 style="color: #d4af37; margin-bottom: 15px;">Admin Panel</h2>
        <select id="admin-mode-selector" style="width: 100%; padding: 12px; margin-bottom: 20px; background: #d4af37; color: #1a1a1a; font-weight: bold; border: none; border-radius: 5px; font-size: 16px;">
            <option value="">✨ 新規作成 (Create New Song)</option>
        </select>
        <label>Song Title:</label>
        <input type="text" id="new-title" style="width: 100%; padding: 10px; margin-bottom: 15px; background: #333; color: #fff; border: 1px solid #d4af37; border-radius: 5px;">
        <label>譜面は原曲キーからいくつズレてる？ (Original Offset):</label>
        <select id="original-offset" style="width: 100%; padding: 10px; margin-bottom: 15px; background: #333; color: #fff; border: 1px solid #d4af37; border-radius: 5px;">
            <option value="0">ズレなし (譜面通りが原曲キー)</option>
            <option value="1">+1</option><option value="2">+2</option><option value="3">+3</option><option value="4">+4</option><option value="5">+5</option><option value="6">+6</option><option value="7">+7</option>
            <option value="-1">-1</option><option value="-2">-2</option><option value="-3">-3</option><option value="-4">-4</option><option value="-5">-5</option><option value="-6">-6</option><option value="-7">-7</option>
        </select>
        <label>Lyrics & Chords:</label>
        <textarea id="new-lyrics" rows="6" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #333; color: #fff; border: 1px solid #d4af37; border-radius: 5px; font-family: monospace;"></textarea>
        <button type="button" id="auto-extract-btn" style="width: 100%; padding: 12px; background: #2a6f97; color: #fff; font-weight: bold; border: none; border-radius: 5px; margin-bottom: 20px; cursor: pointer;">✨ 上のテキストからコードを自動抽出</button>
        <label>コード一覧:</label>
        <div id="chord-dropdown-container" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; min-height: 40px; padding: 10px; background: #222; border-radius: 5px; border: 1px solid #555;"></div>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button type="button" id="add-chord-btn" style="flex: 1; padding: 10px; background: #333; color: #d4af37; border: 1px dashed #d4af37; border-radius: 5px; cursor: pointer; font-weight: bold;">+ 手動で追加</button>
            <button type="button" id="remove-chord-btn" style="padding: 10px; background: #444; color: #ff6b6b; border: 1px solid #444; border-radius: 5px; cursor: pointer;">一個消す</button>
        </div>
        <button id="submit-song" style="width: 100%; padding: 15px; background: #d4af37; color: #1a1a1a; font-weight: bold; border: none; border-radius: 10px; margin-bottom: 10px; cursor: pointer;">Upload / Update Cloud</button>
        <button id="close-admin" style="width: 100%; padding: 10px; background: #444; color: #fff; border: none; border-radius: 10px; cursor: pointer;">Cancel</button>
    </div>
    <button id="open-admin" style="position: fixed; bottom: 10px; right: 10px; background: rgba(212,175,55,0.3); color: #fff; border: none; padding: 5px 10px; border-radius: 5px; font-size: 10px; z-index: 500;">Admin Mode</button>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxy8WCvKCQ4J_1wANZzrkSQEskvqPUf4MGTHchhv5yKYA7W6gV58gxhBLQ4ChYkyWFU/exec"; 

        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const songSelector = document.getElementById('song-selector');
        const keySelector = document.getElementById('key-selector');
        const originalKeyBtn = document.getElementById('original-key-btn');
        const lyricDisplay = document.getElementById('lyric-display');
        const chordArea = document.getElementById('chord-area');
        const strumArea = document.getElementById('strum-area');
        
        const editHeader = document.getElementById('edit-header');
        const resetOrderBtn = document.getElementById('reset-order-btn');
        const saveOrderBtn = document.getElementById('save-order-btn');
        const toast = document.getElementById('toast');

        let isScrolling = false;
        let scrollAnimationFrame;
        let currentScrollY = 0; 
        let lastTime = 0;       
        const scrollBtn = document.getElementById('scroll-btn');
        const scrollSpeed = document.getElementById('scroll-speed');

        let songDatabase = {}; 
        let synth;
        let currentNotes = []; 
        let currentTranspose = 0; 
        let activeNotes = []; 
        let currentSongTitle = "";
        
        let currentChordsArray = []; 
        let originalChordsArray = []; 
        let isEditMode = false;
        let longPressTimer = null;
        let draggedElement = null;
        let placeholder = null;

        async function fetchSongData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                if (data && Object.keys(data).length > 0) {
                    songDatabase = data;
                    initSongSelector();
                    loadSong(Object.keys(songDatabase)[0]);
                    startBtn.textContent = "Start AcoustiSophy";
                    startBtn.style.backgroundColor = "#d4af37";
                    startBtn.style.color = "#1a1a1a";
                }
            } catch (error) {
                console.error("Cloud Sync Failed:", error);
                startBtn.textContent = "Start (Offline Mode)";
            }
        }

        startBtn.onclick = async () => {
            try {
                await Tone.start();
                startBtn.textContent = "Loading Real Sound...";
                synth = new Tone.Sampler({
                    urls: { "A2": "A2.mp3", "C3": "C3.mp3", "E3": "E3.mp3", "G3": "G3.mp3", "A3": "A3.mp3", "C4": "C4.mp3", "E4": "E4.mp3", "G4": "G4.mp3" },
                    baseUrl: "https://nbrosowsky.github.io/tonejs-instruments/samples/guitar-acoustic/",
                    release: 1.8, 
                    onload: () => {
                        startOverlay.style.opacity = '0';
                        setTimeout(() => { startOverlay.style.display = 'none'; }, 500);
                    }
                }).toDestination();
                synth.volume.value = -2;

                initSongSelector();
                loadSong(songSelector.value || Object.keys(songDatabase)[0]);
            } catch (e) {
                console.error("Boot Error:", e);
                startOverlay.style.display = 'none';
            }
        };

        function updateKeyUI(songData) {
            const originalOffset = parseInt(songData.originalOffset || 0);
            if (currentTranspose === originalOffset) {
                originalKeyBtn.classList.add('is-original');
                originalKeyBtn.textContent = "★ Original";
            } else {
                originalKeyBtn.classList.remove('is-original');
                originalKeyBtn.textContent = "Original";
            }
            keySelector.value = currentTranspose;
        }

        function loadSong(songTitle) {
            currentSongTitle = songTitle;
            const songData = songDatabase[songTitle];
            if (!songData) return;
            
            exitEditMode();
            
            const savedKey = localStorage.getItem(`myKey_${songTitle}`);
            currentTranspose = savedKey !== null ? parseInt(savedKey) : 0;
            updateKeyUI(songData);

            let rawLyrics = songData.lyrics.replace(/\\n/g, '\n');
            const formattedLyrics = rawLyrics.replace(/\[(.*?)\]/g, '<span style="color: #d4af37; font-weight: bold;">[$1]</span>');
            lyricDisplay.innerHTML = formattedLyrics;
            
            lyricDisplay.scrollTop = 0; 
            currentScrollY = 0;
            if (isScrolling) scrollBtn.click(); 
            
            originalChordsArray = [...songData.chords]; 
            const savedOrderStr = localStorage.getItem(`customOrder_${songTitle}`);
            if (savedOrderStr) {
                try {
                    const savedOrderNames = JSON.parse(savedOrderStr);
                    currentChordsArray = savedOrderNames.map(name => {
                        return originalChordsArray.find(c => c.name === name) || {name: name, notes: "C4"}; 
                    });
                } catch(e) { currentChordsArray = [...originalChordsArray]; }
            } else { currentChordsArray = [...originalChordsArray]; }

            renderChords();
        }

        function renderChords() {
            chordArea.innerHTML = ""; 
            const chordCount = currentChordsArray.length;
            let cols = 2, rows = 2;
            if (chordCount <= 4) { cols = 2; rows = 2; } 
            else if (chordCount <= 6) { cols = 2; rows = 3; } 
            else if (chordCount <= 8) { cols = 2; rows = 4; } 
            else if (chordCount <= 9) { cols = 3; rows = 3; } 
            else if (chordCount <= 12) { cols = 3; rows = 4; } 
            else { cols = 4; rows = Math.ceil(chordCount / 4); } 

            chordArea.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            chordArea.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

            currentChordsArray.forEach((chord, index) => {
                const btn = document.createElement('div');
                btn.className = 'chord-btn';
                if (index === 0 && !isEditMode) btn.classList.add('active'); 
                btn.textContent = chord.name;
                btn.setAttribute('data-notes', chord.notes);
                btn.setAttribute('data-index', index);
                
                btn.addEventListener('pointerdown', handlePointerDown);
                btn.addEventListener('pointerup', handlePointerUp);
                btn.addEventListener('pointermove', handlePointerMove);
                btn.addEventListener('pointercancel', handlePointerUp);
                
                if(isEditMode) btn.classList.add('jiggling');

                chordArea.appendChild(btn);
            });
            if (currentChordsArray.length > 0 && !isEditMode) currentNotes = currentChordsArray[0].notes.split(',');
        }

        // ★ 長押し判定を「1.5秒（1500ms）」に延長して誤爆を完全に防止！
        function handlePointerDown(e) {
            if (isEditMode) { startDrag(e, this); return; }
            
            longPressTimer = setTimeout(() => { enterEditMode(); }, 1500);

            if (this.classList.contains('active')) { forceMute(); return; }
            document.querySelectorAll('.chord-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentNotes = this.getAttribute('data-notes').split(',');
            softMute();
        }

        function handlePointerUp(e) {
            clearTimeout(longPressTimer); 
            if (isEditMode && draggedElement) { endDrag(e); }
        }

        function handlePointerMove(e) {
            if (!isEditMode) { clearTimeout(longPressTimer); } 
            else if (draggedElement) { moveDrag(e); }
        }

        function enterEditMode() {
            if (isEditMode) return;
            isEditMode = true;
            chordArea.classList.add('edit-mode');
            editHeader.style.display = 'flex';
            document.querySelectorAll('.chord-btn').forEach(btn => {
                btn.classList.add('jiggling');
                btn.classList.remove('active'); 
            });
            forceMute();
        }

        function exitEditMode() {
            isEditMode = false;
            chordArea.classList.remove('edit-mode');
            editHeader.style.display = 'none';
            document.querySelectorAll('.chord-btn').forEach(btn => btn.classList.remove('jiggling'));
            const firstBtn = chordArea.querySelector('.chord-btn');
            if(firstBtn) {
                firstBtn.classList.add('active');
                currentNotes = firstBtn.getAttribute('data-notes').split(',');
            }
        }

        let startY, startX, initialRect;
        function startDrag(e, el) {
            draggedElement = el;
            draggedElement.classList.add('dragging');
            draggedElement.classList.remove('jiggling');
            
            placeholder = document.createElement('div');
            placeholder.className = 'chord-placeholder';
            chordArea.insertBefore(placeholder, draggedElement);
            
            initialRect = draggedElement.getBoundingClientRect();
            const areaRect = chordArea.getBoundingClientRect();
            
            draggedElement.style.position = 'absolute';
            draggedElement.style.width = initialRect.width + 'px';
            draggedElement.style.height = initialRect.height + 'px';
            draggedElement.style.left = (initialRect.left - areaRect.left) + 'px';
            draggedElement.style.top = (initialRect.top - areaRect.top) + 'px';
            
            startX = e.clientX; startY = e.clientY;
            draggedElement.setPointerCapture(e.pointerId);
        }

        function moveDrag(e) {
            const dx = e.clientX - startX; const dy = e.clientY - startY;
            draggedElement.style.transform = `translate(${dx}px, ${dy}px) scale(1.05)`;

            const overElement = document.elementFromPoint(e.clientX, e.clientY);
            if (overElement && overElement.classList.contains('chord-btn') && overElement !== draggedElement) {
                const overRect = overElement.getBoundingClientRect();
                const isAfter = (e.clientY > overRect.top + overRect.height / 2) || (e.clientX > overRect.left + overRect.width / 2);
                if (isAfter) { overElement.after(placeholder); } else { overElement.before(placeholder); }
            }
        }

        function endDrag(e) {
            draggedElement.releasePointerCapture(e.pointerId);
            draggedElement.style.position = ''; draggedElement.style.width = ''; draggedElement.style.height = '';
            draggedElement.style.left = ''; draggedElement.style.top = ''; draggedElement.style.transform = '';
            
            draggedElement.classList.remove('dragging');
            draggedElement.classList.add('jiggling');
            
            placeholder.replaceWith(draggedElement);
            placeholder = null; draggedElement = null;
        }

        saveOrderBtn.onclick = () => {
            const newArray = []; const newNames = [];
            chordArea.querySelectorAll('.chord-btn').forEach(btn => {
                const name = btn.textContent; const notes = btn.getAttribute('data-notes');
                newArray.push({name: name, notes: notes}); newNames.push(name);
            });
            currentChordsArray = newArray;
            localStorage.setItem(`customOrder_${currentSongTitle}`, JSON.stringify(newNames));
            exitEditMode(); renderChords(); 
            toast.style.opacity = 1; setTimeout(() => { toast.style.opacity = 0; }, 2000);
        };

        resetOrderBtn.onclick = () => {
            if(confirm("ボタンの配置を初期状態（自動抽出順）に戻しますか？")) {
                localStorage.removeItem(`customOrder_${currentSongTitle}`);
                currentChordsArray = [...originalChordsArray];
                exitEditMode(); renderChords();
            }
        };

        keySelector.onchange = (e) => { 
            softMute(); currentTranspose = parseInt(e.target.value); 
            localStorage.setItem(`myKey_${currentSongTitle}`, currentTranspose); 
            updateKeyUI(songDatabase[currentSongTitle]);
        };

        originalKeyBtn.onclick = () => {
            const songData = songDatabase[currentSongTitle];
            if(!songData) return;
            softMute(); currentTranspose = parseInt(songData.originalOffset || 0);
            localStorage.setItem(`myKey_${currentSongTitle}`, currentTranspose); 
            updateKeyUI(songData);
        };

        scrollBtn.onclick = () => {
            isScrolling = !isScrolling;
            if (isScrolling) {
                scrollBtn.textContent = "⏸ Pause"; scrollBtn.style.backgroundColor = "#d4af37"; scrollBtn.style.color = "#1a1a1a";
                currentScrollY = lyricDisplay.scrollTop; lastTime = performance.now(); 
                scrollAnimationFrame = requestAnimationFrame(autoScroll);
            } else {
                scrollBtn.textContent = "▶ Scroll"; scrollBtn.style.backgroundColor = "#333"; scrollBtn.style.color = "#d4af37";
                cancelAnimationFrame(scrollAnimationFrame);
            }
        };

        function autoScroll(timestamp) {
            if (!isScrolling) return;
            const deltaTime = timestamp - lastTime; lastTime = timestamp;
            const pixelsPerSecond = parseInt(scrollSpeed.value);
            currentScrollY += pixelsPerSecond * (deltaTime / 1000);
            lyricDisplay.scrollTop = currentScrollY;
            if (lyricDisplay.scrollTop + lyricDisplay.clientHeight >= lyricDisplay.scrollHeight - 1) { scrollBtn.click(); return; }
            scrollAnimationFrame = requestAnimationFrame(autoScroll);
        }

        lyricDisplay.addEventListener('touchstart', () => { if (isScrolling) scrollBtn.click(); }, { passive: true });
        lyricDisplay.addEventListener('wheel', () => { if (isScrolling) scrollBtn.click(); }, { passive: true });


        // ★★★ ストロークの完全リアル化（見えない6本の弦の動的判定） ★★★
        let isStrumming = false;
        let pluckedStrings = new Set();
        let strumRect;
        let lastStringIndex = -1;

        strumArea.addEventListener('pointerdown', (e) => {
            if (!synth || currentNotes.length === 0) return;
            isStrumming = true;
            pluckedStrings.clear();
            lastStringIndex = -1;
            strumRect = strumArea.getBoundingClientRect();
            strumArea.setPointerCapture(e.pointerId);
            processStrum(e);
        });

        strumArea.addEventListener('pointermove', (e) => {
            if (!isStrumming) return;
            processStrum(e);
        });

        strumArea.addEventListener('pointerup', (e) => {
            isStrumming = false;
            strumArea.releasePointerCapture(e.pointerId);
            
            // 指を離したタイミングで弦の振動を止める（ミュート機能 / カッティング）
            // softMute(); // ※ギター特有の余韻を残したい場合はコメントアウト推奨
        });

        function processStrum(e) {
            // エリア内の相対Y座標を計算
            const yPos = e.clientY - strumRect.top;
            const stringCount = currentNotes.length;
            
            // 領域を弦の数（通常4〜6本）で分割する
            const stringSpacing = strumRect.height / stringCount;
            let stringIndex = Math.floor(yPos / stringSpacing);

            // 範囲外にはみ出た指の補正
            if (stringIndex < 0) stringIndex = 0;
            if (stringIndex >= stringCount) stringIndex = stringCount - 1;

            // スワイプが速すぎて中間の弦を飛び越えた場合、間の弦も鳴らす（補完処理）
            if (lastStringIndex !== -1 && lastStringIndex !== stringIndex) {
                const step = stringIndex > lastStringIndex ? 1 : -1;
                let i = lastStringIndex + step;
                while (true) {
                    if (!pluckedStrings.has(i)) {
                        triggerString(i, e.pressure, yPos);
                    }
                    if (i === stringIndex) break;
                    i += step;
                }
            } else if (lastStringIndex === -1) {
                // 最初のタッチ
                triggerString(stringIndex, e.pressure, yPos);
            }
            
            lastStringIndex = stringIndex;
        }

        function triggerString(index, pressure, yPos) {
            pluckedStrings.add(index);
            
            // 下方向へのスワイプ（ダウンストローク）は、インデックス0（低い音）から順に鳴る
            // ※currentNotesはすでに [低音 → 高音] の順で並んでいる前提
            const note = currentNotes[index];
            if (!note) return;

            try {
                const transposedNote = Tone.Frequency(note).transpose(currentTranspose).toNote();
                let velocity = pressure ? Math.max(0.3, pressure) : 0.8;
                synth.triggerAttack(transposedNote, Tone.now(), velocity);
                
                // 視覚的フィードバック（弾いた場所に光る波紋を出す）
                showRipple(yPos);
            } catch(err) { console.warn(err); }
        }

        function showRipple(yPos) {
            const ripple = document.createElement('div');
            ripple.className = 'string-ripple';
            ripple.style.top = yPos + 'px';
            strumArea.appendChild(ripple);
            
            // 少し遅れて消えるアニメーション
            setTimeout(() => { ripple.classList.add('fade'); }, 10);
            setTimeout(() => { ripple.remove(); }, 310);
        }

        // -------------------------------------------------------------

        function softMute() {
            if (!synth || activeNotes.length === 0) return;
            const now = Tone.now();
            activeNotes.forEach(note => { synth.triggerRelease(note, now); });
            activeNotes = [];
        }

        function forceMute() {
            if (!synth) return;
            synth.releaseAll(Tone.now());
            activeNotes = [];
        }

        function initSongSelector() {
            const currentVal = songSelector.value;
            songSelector.innerHTML = "";
            for (const title in songDatabase) {
                const opt = document.createElement('option');
                opt.value = title; opt.textContent = title;
                songSelector.appendChild(opt);
            }
            if (currentVal) songSelector.value = currentVal;
            songSelector.onchange = (e) => loadSong(e.target.value);
        }

        const adminPanel = document.getElementById('admin-panel');
        const adminModeSelector = document.getElementById('admin-mode-selector');
        const titleInput = document.getElementById('new-title');
        const originalOffsetInput = document.getElementById('original-offset');
        const lyricsInput = document.getElementById('new-lyrics');
        const titleLockHint = document.getElementById('title-lock-hint');
        const chordContainer = document.getElementById('chord-dropdown-container');

        const masterChordDictionary = {
            "C": "C3,E3,G3,C4,E4", "Cm": "C3,G3,C4,Eb4,G4", "C7": "C3,E3,Bb3,C4,E4", "Cm7": "C3,G3,Bb3,Eb4,G4", "Csus4": "C3,F3,G3,C4,F4", "Cadd9": "C3,E3,G3,D4,E4",
            "C#": "C#3,F3,G#3,C#4,F4", "C#m": "C#3,G#3,C#4,E4,G#4", "C#7": "C#3,F3,B3,C#4,F4", "C#m7": "C#3,G#3,B3,E4,G#4",
            "Db": "C#3,F3,G#3,C#4,F4", "Dbm": "C#3,G#3,C#4,E4,G#4", "Db7": "C#3,F3,B3,C#4,F4", "Dbm7": "C#3,G#3,B3,E4,G#4",
            "D": "D3,A3,D4,F#4", "Dm": "D3,A3,D4,F4", "D7": "D3,A3,C4,F#4", "Dm7": "D3,A3,C4,F4", "Dsus4": "D3,A3,D4,G4",
            "D#": "Eb3,G3,Bb3,Eb4,G4", "D#m": "Eb3,Gb3,Bb3,Eb4,Gb4", "D#7": "Eb3,G3,Db4,Eb4,G4",
            "Eb": "Eb3,G3,Bb3,Eb4,G4", "Ebm": "Eb3,Gb3,Bb3,Eb4,Gb4", "Eb7": "Eb3,G3,Db4,Eb4,G4",
            "E": "E2,B2,E3,G#3,B3,E4", "Em": "E2,B2,E3,G3,B3,E4", "E7": "E2,B2,D3,G#3,B3,E4", "Em7": "E2,B2,D3,G3,B3,E4", "Esus4": "E2,B2,E3,A3,B3,E4",
            "F": "F2,C3,F3,A3,C4,F4", "Fm": "F2,C3,F3,Ab3,C4,F4", "F7": "F2,C3,Eb3,A3,C4,F4", "Fm7": "F2,C3,Eb3,Ab3,C4,F4",
            "F#": "F#2,C#3,F#3,A#3,C#4,F#4", "F#m": "F#2,C#3,F#3,A3,C#4,F#4", "F#7": "F#2,C#3,E3,A#3,C#4,F#4", "F#m7": "F#2,C#3,E3,A3,C#4,F#4",
            "Gb": "F#2,C#3,F#3,A#3,C#4,F#4", "Gbm": "F#2,C#3,F#3,A3,C#4,F#4", "Gb7": "F#2,C#3,E3,A#3,C#4,F#4", "Gbm7": "F#2,C#3,E3,A3,C#4,F#4",
            "G": "G2,B2,D3,G3,B3,G4", "Gm": "G2,D3,G3,Bb3,D4,G4", "G7": "G2,B2,D3,G3,B3,F4", "Gm7": "G2,D3,F3,Bb3,D4,G4", "Gsus4": "G2,D3,G3,C4,D4,G4",
            "G#": "Ab2,Eb3,Ab3,C4,Eb4,Ab4", "G#m": "Ab2,Eb3,Ab3,Cb4,Eb4,Ab4", "G#7": "Ab2,Eb3,Gb3,C4,Eb4,Ab4",
            "Ab": "Ab2,Eb3,Ab3,C4,Eb4,Ab4", "Abm": "Ab2,Eb3,Ab3,Cb4,Eb4,Ab4", "Ab7": "Ab2,Eb3,Gb3,C4,Eb4,Ab4",
            "A": "A2,E3,A3,C#4,E4", "Am": "A2,E3,A3,C4,E4", "A7": "A2,E3,G3,C#4,E4", "Am7": "A2,E3,G3,C4,E4", "Asus4": "A2,E3,A3,D4,E4",
            "A#": "Bb2,F3,Bb3,D4,F4", "A#m": "Bb2,F3,Bb3,Db4,F4", "A#7": "Bb2,F3,Ab3,D4,F4",
            "Bb": "Bb2,F3,Bb3,D4,F4", "Bbm": "Bb2,F3,Bb3,Db4,F4", "Bb7": "Bb2,F3,Ab3,D4,F4",
            "B": "B2,F#3,B3,D#4,F#4", "Bm": "B2,F#3,B3,D4,F#4", "B7": "B2,D#3,A3,B3,F#4", "Bm7": "B2,F#3,A3,D4,F#4"
        };
        const rootOptions = ["C", "C#", "Db", "D", "D#", "Eb", "E", "F", "F#", "Gb", "G", "G#", "Ab", "A", "A#", "Bb", "B"];
        const qualityOptions = [ { label: "Major(なし)", value: "" }, { label: "m", value: "m" }, { label: "7", value: "7" }, { label: "m7", value: "m7" }, { label: "sus4", value: "sus4" }, { label: "add9", value: "add9" } ];

        document.getElementById('open-admin').onclick = () => {
            adminModeSelector.innerHTML = '<option value="">✨ 新規作成 (Create New Song)</option>';
            for (const title in songDatabase) {
                const opt = document.createElement('option');
                opt.value = title; opt.textContent = `✏️ 編集: ${title}`;
                adminModeSelector.appendChild(opt);
            }
            adminPanel.style.display = 'block';
        };

        document.getElementById('close-admin').onclick = () => adminPanel.style.display = 'none';

        adminModeSelector.onchange = (e) => {
            const selectedTitle = e.target.value;
            chordContainer.innerHTML = ''; 
            if (!selectedTitle) {
                titleInput.value = ''; lyricsInput.value = ''; titleInput.readOnly = false; titleInput.style.opacity = '1'; titleLockHint.style.display = 'none';
                originalOffsetInput.value = "0"; 
            } else {
                const song = songDatabase[selectedTitle];
                titleInput.value = selectedTitle; titleInput.readOnly = true; titleInput.style.opacity = '0.6'; titleLockHint.style.display = 'inline';
                lyricsInput.value = song.lyrics; 
                originalOffsetInput.value = song.originalOffset !== undefined ? song.originalOffset : "0"; 
                
                song.chords.forEach(chord => {
                    let root = ""; let quality = "";
                    if (chord.name.length > 1 && (chord.name[1] === '#' || chord.name[1] === 'b')) {
                        root = chord.name.substring(0, 2); quality = chord.name.substring(2);
                    } else { root = chord.name.substring(0, 1); quality = chord.name.substring(1); }
                    createChordDropdown(root, quality);
                });
            }
        };

        function createChordDropdown(defaultRoot = "C", defaultQuality = "") {
            const wrapper = document.createElement('div');
            wrapper.className = 'chord-group';
            wrapper.style.cssText = "display: flex; background: #d4af37; border-radius: 8px; overflow: hidden; border: 2px solid #b8962e;";
            const rootSelect = document.createElement('select');
            rootSelect.className = 'root-select';
            rootSelect.style.cssText = "padding: 10px; font-size: 16px; background: transparent; color: #1a1a1a; border: none; font-weight: bold; cursor: pointer; outline: none; border-right: 1px solid rgba(0,0,0,0.2);";
            rootOptions.forEach(root => { const opt = document.createElement('option'); opt.value = root; opt.textContent = root; if(root === defaultRoot) opt.selected = true; rootSelect.appendChild(opt); });
            const qualitySelect = document.createElement('select');
            qualitySelect.className = 'quality-select';
            qualitySelect.style.cssText = "padding: 10px; font-size: 16px; background: transparent; color: #1a1a1a; border: none; font-weight: bold; cursor: pointer; outline: none;";
            qualityOptions.forEach(q => { const opt = document.createElement('option'); opt.value = q.value; opt.textContent = q.label; if(q.value === defaultQuality) opt.selected = true; qualitySelect.appendChild(opt); });
            wrapper.appendChild(rootSelect); wrapper.appendChild(qualitySelect); chordContainer.appendChild(wrapper);
        }

        document.getElementById('add-chord-btn').onclick = () => createChordDropdown();
        document.getElementById('remove-chord-btn').onclick = () => { if (chordContainer.lastChild) chordContainer.removeChild(chordContainer.lastChild); };

        function surgicalSplit(initialTokens) {
            let processedTokens = [];
            const gluedRegex = /^([A-G][#b]?(?:m|M|add|sus|dim|aug|maj|)?\d*(?:\-[0-9])?(?:\/[A-G][#b]?)?|N\.?C\.?)([ぁ-んァ-ヶｱ-ﾝﾞ-ﾟ一-龠].*)$/i;

            for (let t of initialTokens) {
                let cleanT = t.replace(/\[|\]/g, ""); 
                let match = cleanT.match(gluedRegex);
                if (match) {
                    let potentialChord = match[1];
                    let lyricPart = match[2];
                    if (potentialChord.toUpperCase().startsWith("N.C") || masterChordDictionary[potentialChord] || /^[A-G]/i.test(potentialChord)) {
                        processedTokens.push(potentialChord); 
                        processedTokens.push(lyricPart);      
                        continue;
                    }
                }
                processedTokens.push(t); 
            }
            return processedTokens;
        }

        document.getElementById('auto-extract-btn').onclick = () => {
            const text = document.getElementById('new-lyrics').value;
            if (!text) return alert("テキストを貼り付けてください！");
            
            let rawTokens = text.split(/[\s\n\t　]+/);
            let tokens = surgicalSplit(rawTokens); 

            let foundUniqueChords = new Set(); 
            const chordRegex = /^[A-G][#b]?(m|M|add|sus|dim|aug|maj)?[0-9]*(\-[0-9])?(\/[A-G][#b]?)?$/i;

            tokens.forEach(token => {
                let cleanToken = token.trim().replace(/\[|\]/g, "");
                if (cleanToken !== "" && !/[ぁ-んァ-ヶｱ-ﾝﾞ-ﾟ一-龠]/.test(cleanToken) && chordRegex.test(cleanToken)) {
                    let baseChord = masterChordDictionary[cleanToken] ? cleanToken : cleanToken.replace(/dim|aug|sus4|add9|m7-5/g, '');
                    if(masterChordDictionary[baseChord]) {
                        foundUniqueChords.add(baseChord);
                    }
                }
            });
            if (foundUniqueChords.size === 0) return alert("抽出できる基本コードが見つかりませんでした。");
            chordContainer.innerHTML = '';
            foundUniqueChords.forEach(chordName => {
                let root = (chordName.length > 1 && (chordName[1] === '#' || chordName[1] === 'b')) ? chordName.substring(0, 2) : chordName.substring(0, 1);
                createChordDropdown(root, chordName.substring(root.length));
            });
            alert(`${foundUniqueChords.size} 個の基本コードを抽出しました！`);
        };

        document.getElementById('submit-song').onclick = async () => {
            const title = titleInput.value;
            const originalOffset = parseInt(originalOffsetInput.value); 
            let rawLyrics = lyricsInput.value.replace(/[\u200B-\u200D\uFEFF]/g, '');

            let initialTokens = rawLyrics.split(/[\s\t\n\r　]+/).filter(t => t !== "");
            let tokens = surgicalSplit(initialTokens);

            let resultText = "";
            let pendingChords = [];
            const chordRegex = /^\[?[A-G][#b]?(m|M|add|sus|dim|aug|maj|)?\d*(\-[0-9])?(\/[A-G][#b]?)?\]?$/i;

            for (let token of tokens) {
                let hasJapanese = /[ぁ-んァ-ヶｱ-ﾝﾞ-ﾟ一-龠]/.test(token);

                if (!hasJapanese) {
                    let cleanToken = token.replace(/\[|\]/g, "");
                    let isValidChord = (cleanToken.toUpperCase().startsWith("N.C") || chordRegex.test(token) || masterChordDictionary[cleanToken]);
                    
                    if (isValidChord) { pendingChords.push(cleanToken); }
                } else {
                    let chordStr = pendingChords.length > 0 ? pendingChords.map(c => `[${c}]`).join("") : "";
                    resultText += (resultText ? "　" : "") + chordStr + token;
                    pendingChords = [];
                }
            }
            if (pendingChords.length > 0) { resultText += (resultText ? "　" : "") + pendingChords.map(c => `[${c}]`).join(""); }

            let cleanedLyrics = resultText;
            
            const chordGroups = document.querySelectorAll('.chord-group');
            let hasError = false, errorChordName = "";
            const chordsArray = Array.from(chordGroups).map(group => {
                const combinedName = group.querySelector('.root-select').value + group.querySelector('.quality-select').value; 
                if (!masterChordDictionary[combinedName]) { hasError = true; errorChordName = combinedName; }
                return { name: combinedName, notes: masterChordDictionary[combinedName] || "C4,E4,G4" };
            });

            if (!title || !cleanedLyrics) return alert("曲名と歌詞は必須です！");
            if (chordsArray.length === 0) return alert("コードを最低1つは追加してください！");
            if (hasError) return alert(`「${errorChordName}」は未対応です！変更してください。`);

            document.getElementById('submit-song').textContent = "Uploading / Updating...";

            try {
                const payload = { title: title, lyrics: cleanedLyrics, chords: JSON.stringify(chordsArray), originalOffset: originalOffset };
                
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status === "success") {
                    alert("クラウドへの保存（アップデート）が完了しました！");
                    adminPanel.style.display = 'none';
                    titleInput.value = ''; lyricsInput.value = ''; chordContainer.innerHTML = ''; 
                    location.reload(); 
                } else { throw new Error(result.message); }
            } catch (error) {
                alert("エラーが発生しました: " + error);
                document.getElementById('submit-song').textContent = "Upload / Update Cloud";
            }
        };

        fetchSongData();
    </script>
</body>
</html>
