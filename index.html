<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AcoustiSophy - v5.0 GAS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { background-color: #1a1a1a; color: #d4af37; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        #start-btn { padding: 20px 40px; font-size: 24px; font-weight: bold; color: #1a1a1a; background-color: #d4af37; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4); }
        #guide-area { height: 40%; background-color: #222; border-bottom: 2px solid #d4af37; display: flex; flex-direction: column; padding: 10px; }
        #controls { display: flex; gap: 10px; margin-bottom: 8px; }
        #song-selector { flex-grow: 1; padding: 10px; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; font-size: 16px; }
        #key-selector { width: 80px; padding: 10px; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; }
        #lyric-display { flex-grow: 1; overflow-y: auto; color: #eee; font-size: 16px; line-height: 1.6; white-space: pre-wrap; padding: 8px; background: #1a1a1a; border-radius: 8px; }
        #app-container { display: flex; height: 60%; width: 100%; }
        #chord-area { width: 50%; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; padding: 12px; border-right: 2px solid #333; }
        .chord-btn { background-color: #2a2a2a; color: #fff; font-size: 28px; font-weight: bold; border: 2px solid #444; border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .chord-btn.active { background-color: #d4af37; color: #1a1a1a; border-color: #fff; }
        #strum-area { width: 50%; background: linear-gradient(135deg, #111, #222); display: flex; justify-content: center; align-items: center; }
        #strum-text { color: #555; font-size: 18px; }
        .strum-flash { background: rgba(212, 175, 55, 0.2) !important; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="start-btn">Connect to Cloud...</button>
    </div>

    <div id="guide-area">
        <div id="controls">
            <select id="song-selector"></select>
            <select id="key-selector">
                <option value="3">+3</option><option value="2">+2</option><option value="1">+1</option>
                <option value="0" selected>±0</option>
                <option value="-1">-1</option><option value="-2">-2</option><option value="-3">-3</option>
            </select>
        </div>
        <div id="lyric-display"></div>
    </div>

    <div id="app-container">
        <div id="chord-area"></div>
        <div id="strum-area"><div id="strum-text">Tap to Strum</div></div>
    </div>

    <script>
    // ★最新の GAS URL に貼り直してください！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyfdlnUcZAZRYSzCuvn8YYEr8SqYGGr6uofG_tl_9S-MtoGqB0xsgrnYeXcR3cCzXXD/exec";

    
// ★予備データ：通信失敗時でも「絶対に」これを表示させる
let songDatabase = {
    "【Offline】上を向いて歩こう": {
        chords: [{ name: "G", notes: "G3,B3,D4" }, { name: "Em", notes: "E3,G3,B3" }, { name: "C", notes: "C4,E4,G4" }, { name: "D", notes: "D4,F#4,A4" }],
        lyrics: "※現在オフラインです。GASの設定を確認してください。\nG  Em  C  D\n上を向いて歩こう..."
    }
};

async function fetchSongData() {
    try {
        // 10秒でタイムアウトさせる設定
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        const response = await fetch(GAS_URL, { signal: controller.signal });
        clearTimeout(timeoutId);

        if (!response.ok) throw new Error("Network Error");

        const data = await response.json();
        if (data && Object.keys(data).length > 0) {
            songDatabase = data; // 成功時のみ上書き
            startBtn.textContent = "Start AcoustiSophy";
            startBtn.style.backgroundColor = "#d4af37";
            console.log("Cloud Sync Success!");
        }
    } catch (error) {
        console.error("Connection Failed:", error);
        startBtn.textContent = "Start (Offline Mode)";
        startBtn.style.backgroundColor = "#666"; // 失敗時はグレーにする
    }
}

// 起動ボタン：何が起きても「絶対に」画面を出す
startBtn.onclick = async () => {
    try {
        await Tone.start();
        // 失敗に備えて PolySynth(Synth) をデフォルトにする
        synth = new Tone.PolySynth(Tone.Synth).toDestination();
        
        // 曲データの初期化
        initSongSelector();
        const titles = Object.keys(songDatabase);
        if (titles.length > 0) {
            loadSong(titles[0]);
        } else {
            alert("データが完全に空です。シートを確認してください。");
        }

    } catch (e) {
        console.error("Critical Boot Error:", e);
    } finally {
        // ★たとえエラーでも、黒い幕（オーバーレイ）を強制除去！
        startOverlay.style.opacity = '0';
        setTimeout(() => { startOverlay.style.display = 'none'; }, 500);
    }
};

fetchSongData();
    </script>
</body>
</html>
