<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AcoustiSophy - v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        body {
            background-color: #1a1a1a;
            color: #d4af37;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column; /* 縦並びに変更 */
        }

        /* 起動前のロック画面 */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 20px 40px;
            font-size: 28px;
            font-weight: bold;
            color: #1a1a1a;
            background-color: #d4af37;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.5);
        }

        /* === 上部：ガイドエリア（曲選択 ＆ 歌詞表示） === */
        #guide-area {
            height: 35%; /* 画面の約1/3を使用 */
            background-color: #222;
            border-bottom: 2px solid #d4af37;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        #song-selector {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 8px;
            margin-bottom: 10px;
            outline: none;
        }

        #lyric-display {
            flex-grow: 1;
            overflow-y: auto; /* 歌詞が長い場合はここだけスクロール可能 */
            color: #eee;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap; /* 改行やスペースをそのまま表示 */
            padding: 5px;
            /* 歌詞エリアは文字選択できるようにする（スクロール操作のため） */
            user-select: auto; 
            touch-action: auto;
        }

        /* === 下部：楽器本体（左手と右手） === */
        #app-container {
            display: flex;
            height: 65%; /* 残りの画面を使用 */
            width: 100%;
        }

        /* 左側：コード選択エリア */
        #chord-area {
            width: 50%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 15px;
            border-right: 2px solid #333;
            background-color: #1a1a1a;
        }

        .chord-btn {
            background-color: #2a2a2a;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            border: 2px solid #444;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.1s, transform 0.1s;
        }

        .chord-btn.active {
            background-color: #d4af37;
            color: #1a1a1a;
            transform: scale(0.96);
            border-color: #fff;
        }

        /* 右側：ストロークエリア */
        #strum-area {
            width: 50%;
            background: linear-gradient(135deg, #111, #222);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: crosshair;
        }

        #strum-text {
            color: #666;
            font-size: 20px;
            pointer-events: none;
        }
        
        .strum-flash {
            background: rgba(212, 175, 55, 0.3) !important;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="start-btn">Start AcoustiSophy</button>
    </div>

    <div id="guide-area">
        <select id="song-selector">
            </select>
        <div id="lyric-display">ここに歌詞とコードが表示されます</div>
    </div>

    <div id="app-container">
        <div id="chord-area"></div>

        <div id="strum-area">
            <div id="strum-text">Tap to Strum</div>
        </div>
    </div>

    <script>
        // === 1. データベース（曲のデータ） ===
        const songDatabase = {
            "上を向いて歩こう": {
                chords: [
                    { name: "G", notes: "G3,B3,D4" },
                    { name: "Em", notes: "E3,G3,B3" },
                    { name: "C", notes: "C4,E4,G4" },
                    { name: "D", notes: "D4,F#4,A4" }
                ],
                lyrics: `G        Em       C      D
上を向いて　歩こう
G        Em       C      D
涙がこぼれないように

G        Em       C      D
思い出す　春の日
C        D        G
一人ぽっちの夜`
            },
            "Stand By Me": {
                chords: [
                    { name: "A", notes: "A3,C#4,E4" },
                    { name: "F#m", notes: "F#3,A3,C#4" },
                    { name: "D", notes: "D4,F#4,A4" },
                    { name: "E", notes: "E3,G#3,B3" }
                ],
                lyrics: `A
When the night has come
F#m
And the land is dark
D              E                  A
And the moon is the only light we'll see

A
No I won't be afraid
F#m
Oh I won't be afraid
D              E                  A
Just as long as you stand, stand by me`
            }
        };

        // === 2. システム変数の準備 ===
        let synth;
        let currentNotes = []; 
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const songSelector = document.getElementById('song-selector');
        const lyricDisplay = document.getElementById('lyric-display');
        const chordArea = document.getElementById('chord-area');
        const strumArea = document.getElementById('strum-area');

        document.addEventListener('contextmenu', event => event.preventDefault());

        // === 3. 起動の儀式 ===
        startBtn.addEventListener('click', async () => {
            await Tone.start();
            synth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "triangle" },
                envelope: { attack: 0.01, decay: 1.5, sustain: 0, release: 1.5 }
            }).toDestination();
            synth.volume.value = -6;

            // 初期化：セレクトボックスに曲を追加し、最初の曲を読み込む
            initSongSelector();
            loadSong(Object.keys(songDatabase)[0]); // 1曲目をセット

            startOverlay.style.opacity = '0';
            setTimeout(() => { startOverlay.style.display = 'none'; }, 500);
        });

        // === 4. 曲の切り替えロジック ===
        function initSongSelector() {
            // データベースから曲名を抽出してプルダウンを作成
            for (const songTitle in songDatabase) {
                const option = document.createElement('option');
                option.value = songTitle;
                option.textContent = songTitle;
                songSelector.appendChild(option);
            }

            // プルダウンを変更した時の処理
            songSelector.addEventListener('change', (e) => {
                loadSong(e.target.value);
            });
        }

        function loadSong(songTitle) {
            const songData = songDatabase[songTitle];
            
            // 1. 歌詞エリアの更新
            lyricDisplay.textContent = songData.lyrics;

            // 2. 左手コードボタンの再構築
            chordArea.innerHTML = ""; // 古いボタンを全て消去
            
            songData.chords.forEach((chord, index) => {
                const btn = document.createElement('div');
                btn.className = 'chord-btn';
                if (index === 0) btn.classList.add('active'); // 最初の一つをアクティブに
                btn.textContent = chord.name;
                btn.setAttribute('data-notes', chord.notes);
                
                // ボタンを押した時のイベントを付与
                btn.addEventListener('pointerdown', (e) => {
                    document.querySelectorAll('.chord-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    const notesString = e.target.getAttribute('data-notes');
                    currentNotes = notesString.split(',');
                    
                    if (synth) synth.triggerAttackRelease(currentNotes, "1n");
                    if (navigator.vibrate) navigator.vibrate(10);
                });

                chordArea.appendChild(btn);
            });

            // 3. 読み込み直後は、1番目のコードを現在の音としてセット
            currentNotes = songData.chords[0].notes.split(',');
        }

        // === 5. 右手：ストロークロジック ===
        strumArea.addEventListener('pointerdown', () => {
            if (!synth || currentNotes.length === 0) return; 
            synth.triggerAttackRelease(currentNotes, "1n");
            
            strumArea.classList.add('strum-flash');
            setTimeout(() => { strumArea.classList.remove('strum-flash'); }, 100);
            if (navigator.vibrate) navigator.vibrate(15);
        });

    </script>
</body>
</html>
