<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AcoustiSophy - v4.2 Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a1a1a;
            color: #d4af37;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ★修正：画面全体を完璧にロックする設定 */
        #start-overlay {
            position: fixed; /* absoluteからfixedに変更し、画面に固定 */
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            background-color: #000; /* 完全に真っ黒にする */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* どんな要素よりも一番上に配置 */
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 20px 40px;
            font-size: 28px;
            font-weight: bold;
            color: #1a1a1a;
            background-color: #d4af37;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.5);
        }

        /* ガイドエリア */
        #guide-area {
            height: 40%;
            background-color: #222;
            border-bottom: 2px solid #d4af37;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        #controls { display: flex; gap: 10px; margin-bottom: 10px; }
        #song-selector, #key-selector {
            padding: 10px; font-size: 16px; background-color: #333; color: #fff; border: 1px solid #555; border-radius: 8px;
        }
        #song-selector { flex-grow: 1; }

        #lyric-display {
            flex-grow: 1; overflow-y: auto; color: #eee; font-size: 16px; line-height: 1.6; white-space: pre-wrap; padding: 5px;
        }

        /* 楽器本体 */
        #app-container { display: flex; height: 60%; width: 100%; }
        #chord-area {
            width: 50%; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; padding: 15px; border-right: 2px solid #333;
        }
        .chord-btn {
            background-color: #2a2a2a; color: #fff; font-size: 32px; font-weight: bold; border: 2px solid #444; border-radius: 12px; display: flex; justify-content: center; align-items: center;
        }
        .chord-btn.active { background-color: #d4af37; color: #1a1a1a; transform: scale(0.96); border-color: #fff; }

        #strum-area {
            width: 50%; background: linear-gradient(135deg, #111, #222); display: flex; justify-content: center; align-items: center;
        }
        #strum-text { color: #666; font-size: 20px; }
        .strum-flash { background: rgba(212, 175, 55, 0.3) !important; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="start-btn">Start AcoustiSophy</button>
    </div>

    <div id="guide-area">
        <div id="controls">
            <select id="song-selector"></select>
            <select id="key-selector">
                <option value="3">+3</option><option value="2">+2</option><option value="1">+1</option>
                <option value="0" selected>±0</option>
                <option value="-1">-1</option><option value="-2">-2</option><option value="-3">-3</option>
            </select>
        </div>
        <div id="lyric-display"></div>
    </div>

    <div id="app-container">
        <div id="chord-area"></div>
        <div id="strum-area"><div id="strum-text">Tap to Strum</div></div>
    </div>

    <script>
        const songDatabase = {
            "上を向いて歩こう": {
                chords: [{ name: "G", notes: "G3,B3,D4" }, { name: "Em", notes: "E3,G3,B3" }, { name: "C", notes: "C4,E4,G4" }, { name: "D", notes: "D4,F#4,A4" }],
                lyrics: `G    Em    C    D\n上を向いて歩こう\nG    Em    C    D\n涙がこぼれないように`
            },
            "Stand By Me": {
                chords: [{ name: "A", notes: "A3,C#4,E4" }, { name: "F#m", notes: "F#3,A3,C#4" }, { name: "D", notes: "D4,F#4,A4" }, { name: "E", notes: "E3,G#3,B3" }],
                lyrics: `A\nWhen the night has come\nF#m\nAnd the land is dark`
            }
        };

        let synth;
        let currentNotes = []; 
        let currentTranspose = 0; 

        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const songSelector = document.getElementById('song-selector');
        const keySelector = document.getElementById('key-selector');
        const lyricDisplay = document.getElementById('lyric-display');
        const chordArea = document.getElementById('chord-area');
        const strumArea = document.getElementById('strum-area');

        function playChord() {
            if (!synth || currentNotes.length === 0) return;
            const now = Tone.now();
            currentNotes.forEach((note, index) => {
                try {
                    const transposedNote = Tone.Frequency(note).transpose(currentTranspose).toNote();
                    synth.triggerAttackRelease(transposedNote, "2n", now + (index * 0.03));
                } catch(e) { console.error("音の再生エラー:", e); }
            });
        }

        // ★修正：起動ロジックの順序を整理し、エラー耐性を強化
        startBtn.addEventListener('click', async () => {
            try {
                await Tone.start();
                console.log("Audio Context Started");

                // 楽器の生成
                synth = new Tone.PolySynth(Tone.PluckSynth).toDestination();
                synth.volume.value = 0;

                // UIの初期化
                initSongSelector();
                loadSong(Object.keys(songDatabase)[0]); 

            } catch (error) {
                console.error("起動エラー:", error);
            } finally {
                // ★たとえエラーが起きても、強制的に画面だけは切り替える
                startOverlay.style.opacity = '0';
                setTimeout(() => { startOverlay.style.display = 'none'; }, 500);
            }
        });

        keySelector.addEventListener('change', (e) => {
            currentTranspose = parseInt(e.target.value);
            playChord();
        });

        function initSongSelector() {
            songSelector.innerHTML = "";
            for (const songTitle in songDatabase) {
                const option = document.createElement('option');
                option.value = songTitle;
                option.textContent = songTitle;
                songSelector.appendChild(option);
            }
            songSelector.onchange = (e) => loadSong(e.target.value);
        }

        function loadSong(songTitle) {
            const songData = songDatabase[songTitle];
            if(!songData) return;
            lyricDisplay.textContent = songData.lyrics;
            chordArea.innerHTML = ""; 
            songData.chords.forEach((chord, index) => {
                const btn = document.createElement('div');
                btn.className = 'chord-btn';
                if (index === 0) btn.classList.add('active'); 
                btn.textContent = chord.name;
                btn.setAttribute('data-notes', chord.notes);
                btn.onpointerdown = (e) => {
                    document.querySelectorAll('.chord-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentNotes = e.target.getAttribute('data-notes').split(',');
                    playChord();
                };
                chordArea.appendChild(btn);
            });
            currentNotes = songData.chords[0].notes.split(',');
        }

        strumArea.onpointerdown = () => {
            playChord();
            strumArea.classList.add('strum-flash');
            setTimeout(() => { strumArea.classList.remove('strum-flash'); }, 100);
        };
    </script>
</body>
</html>
